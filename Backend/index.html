<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма отправки</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div class="container">
        <div id="error-message" class="error hidden"></div>
        <div class="form-container" id="form-container">
            <form id="submit-form">
                <div class="form-group">
                    <input 
                        placeholder="Имя" 
                        type="text" 
                        id="name" 
                        name="name" 
                        required
                    >
                </div>
                <div class="form-group">
                    <input  
                        placeholder="Email" 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                    >
                </div>
                <div class="form-group">
                    <input 
                        placeholder="Телефон" 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        required
                    >
                </div>
                <button type="submit">Отправить</button>
            </form>
        </div>
        <div id="success-message" class="success hidden">
            <h3>Спасибо!</h3>
            <p>Ваша заявка успешно отправлена. Мы свяжемся с вами в ближайшее время.</p>
        </div>
    </div>
</body>
</html>
