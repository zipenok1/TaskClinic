<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/global.css">
    <script src="main.js" defer></script>
    <title>Document</title>
</head>
<body>
    <header class="header wrap">
        <div class="header__top">
            <div class="header__top-left">
                <div class="header__top-logo">
                    <img src="assets/icon/logo.svg" alt="logo">
                    <div>
                        <span>АкваМед</span>
                        <p>Клиника капельниц</p>
                    </div>
                </div>
                <div class="header__top-contacts">
                    <div class="header__contacts-grup">
                        <img src="assets/icon/address.svg" alt="address">
                        <div>
                            <span>Адрес</span>
                            <p>Санкт-Петербург, ул. Авиаконструкторов 45к1</p>
                        </div>
                    </div>
                    <div class="header__contacts-grup">
                        <img src="assets/icon/tel.svg" alt="tel">
                        <div>
                            <span>Поддержка 24/7</span>
                            <p>+7 (800) 889-99-99</p>
                        </div>
                    </div>
                    <div class="header__contacts-grup">
                        <img src="assets/icon/time.svg" alt="time">
                        <div>
                            <span>Время работы</span>
                            <p>Круглосуточно</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-social">
                <img src="assets/icon/mode.svg" alt="mode">
                <a href="">
                    <img src="assets/icon/search.svg" alt="search">
                </a>
                <a href="">
                    <img src="assets/icon/vk.svg" alt="vk">
                </a>
                <a href="">
                    <img src="assets/icon/tg.svg" alt="tg">
                </a>
                <a href="">
                    <img src="assets/icon/od.svg" alt="od">
                </a>
            </div>
        </div>
        <div class="header__bott">
            <nav>
                <ul>
                    <li><a href="" class="white">Услуги</a></li>
                    <li><a href="">О клинике</a></li>
                    <li><a href="">Цены</a></li>
                    <li><a href="">Врачи</a></li>
                    <li><a href="">Контакты</a></li>
                    <li><a href="">Статьи</a></li>
                </ul>
            </nav>
            <div class="header__bott-butt">
                <button>Записаться</button>
                <button>Капельница на дому</button>
            </div>
        </div>
    </header>
    
    <main></main>
</body>
</html>
